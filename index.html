<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Momos Hub • 3D Cart</title>
    <!-- Fonts & Base Styles -->
    <link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: #3E2723;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        /* UI Overlay - Glassmorphism with Momos Hub colors */
        .content {
            position: relative;
            z-index: 10;
            pointer-events: none; /* Allows clicking through to canvas, but we enable on buttons */
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem 4rem;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: auto;
        }
        .logo {
            font-family: 'Clash Display', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            color: #FDFBF7;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            letter-spacing: -0.02em;
        }
        .logo span {
            color: #FF7A2F;
        }
        .nav {
            display: flex;
            gap: 2rem;
            backdrop-filter: blur(12px);
            background: rgba(253, 251, 247, 0.2);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            border: 1px solid rgba(255,255,255,0.3);
        }
        .nav a {
            color: #FDFBF7;
            text-decoration: none;
            font-weight: 500;
            font-size: 1.1rem;
            transition: color 0.2s;
        }
        .nav a:hover {
            color: #FF7A2F;
        }
        .hero {
            pointer-events: auto;
            max-width: 600px;
            margin-top: 10vh;
        }
        .hero h1 {
            font-family: 'Clash Display', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1.1;
            margin: 0;
            color: #FDFBF7;
            text-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .hero h1 .orange {
            color: #FF7A2F;
        }
        .hero h1 .teal {
            color: #00B4B3;
        }
        .hero p {
            font-size: 1.2rem;
            color: #FDFBF7;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin: 1.5rem 0;
            backdrop-filter: blur(8px);
            background: rgba(62, 39, 35, 0.2);
            display: inline-block;
            padding: 0.8rem 1.8rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .cta-buttons {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .btn {
            pointer-events: auto;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.2rem;
            border: none;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Inter', sans-serif;
            backdrop-filter: blur(8px);
        }
        .btn-primary {
            background: #FF7A2F;
            color: #FDFBF7;
            box-shadow: 0 8px 20px rgba(255, 122, 47, 0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary {
            background: rgba(253, 251, 247, 0.15);
            color: #FDFBF7;
            border: 1px solid #00B4B3;
            box-shadow: 0 8px 20px rgba(0, 180, 179, 0.2);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }
        .footer {
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            color: #FDFBF7;
            backdrop-filter: blur(8px);
            background: rgba(62, 39, 35, 0.15);
            padding: 0.8rem 2rem;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            width: fit-content;
        }
        .cart-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #00B4B3;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            color: #FDFBF7;
            font-weight: 600;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .content { padding: 1.5rem; }
            .hero h1 { font-size: 3.5rem; }
            .nav { display: none; }
        }
    </style>
    <!-- Import Maps for Three.js and GSAP -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "gsap": "https://unpkg.com/gsap@3.12.5/index.js",
                "gsap/ScrollTrigger": "https://unpkg.com/gsap@3.12.5/ScrollTrigger.js"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="content">
        <header class="header">
            <div class="logo">MOMOS<span>HUB</span></div>
            <nav class="nav">
                <a href="#">Home</a>
                <a href="#">Menu</a>
                <a href="#">Our Cart</a>
                <a href="#">Contact</a>
            </nav>
        </header>
        
        <div class="hero">
            <h1>
                <span class="orange">Steamy</span> Momos<br>
                <span class="teal">Iced</span> Coffee
            </h1>
            <p>✨ Handcrafted happiness on wheels ✨</p>
            <div class="cta-buttons">
                <button class="btn btn-primary" id="order-now">Order Now 🥟</button>
                <button class="btn btn-secondary" id="explore-menu">Explore Menu ☕</button>
            </div>
        </div>
        
        <footer class="footer">
            <div>📍 Find us at Food Street</div>
            <div class="cart-indicator" id="cart-btn">
                <span>🛒</span> Your Cart • 0
            </div>
        </footer>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import gsap from 'gsap';
        import { ScrollTrigger } from 'gsap/ScrollTrigger';

        // Register GSAP plugin
        gsap.registerPlugin(ScrollTrigger);

        // --- Setup Scene, Camera, Renderer ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a1a'); // dark base, we'll add gradient via CSS or fog
        
        // Add fog for depth
        scene.fog = new THREE.FogExp2('#1a1a1a', 0.015);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- Controls (limited to give a nice view) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;
        controls.enableZoom = true;
        controls.enablePan = false;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minPolarAngle = Math.PI / 6;
        controls.target.set(0, 1.5, 0);

        // --- Lighting (Warm orange + Cool teal) ---
        // Ambient base
        scene.add(new THREE.AmbientLight(0x404060, 0.4));
        
        // Main warm light (momos)
        const warmLight = new THREE.PointLight(0xFF7A2F, 1.5, 20);
        warmLight.position.set(2, 3, 2);
        warmLight.castShadow = true;
        warmLight.shadow.mapSize.width = 1024;
        warmLight.shadow.mapSize.height = 1024;
        scene.add(warmLight);
        
        // Cool fill light (coffee)
        const coolLight = new THREE.PointLight(0x00B4B3, 1.2, 20);
        coolLight.position.set(-2, 2, 3);
        scene.add(coolLight);
        
        // Back rim light
        const backLight = new THREE.PointLight(0xFFFFFF, 0.8);
        backLight.position.set(-1, 4, -3);
        scene.add(backLight);
        
        // Additional fill
        const fillLight = new THREE.DirectionalLight(0xccddff, 0.5);
        fillLight.position.set(1, 2, 1);
        scene.add(fillLight);

        // Add a subtle grid floor and reflective plane
        const gridHelper = new THREE.GridHelper(15, 20, 0xFF7A2F, 0x3E2723);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);
        
        // Reflective disc
        const discGeometry = new THREE.CylinderGeometry(3.5, 3.5, 0.05, 64);
        const discMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x3E2723, 
            roughness: 0.3, 
            metalness: 0.1,
            transparent: true,
            opacity: 0.7
        });
        const disc = new THREE.Mesh(discGeometry, discMaterial);
        disc.position.y = 0;
        disc.receiveShadow = true;
        disc.rotation.x = 0;
        scene.add(disc);

        // --- Create Stylized Momos (Steamer with dumplings) using primitives ---
        function createMomosGroup() {
            const group = new THREE.Group();
            
            // Bamboo steamer base (cylinder)
            const steamerBaseGeo = new THREE.CylinderGeometry(1.6, 1.6, 0.15, 32);
            const steamerBaseMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B, roughness: 0.7, bumpMap: new THREE.CanvasTexture(generateWoodGrainCanvas()) });
            const base = new THREE.Mesh(steamerBaseGeo, steamerBaseMat);
            base.position.y = 0.1;
            base.receiveShadow = true;
            base.castShadow = true;
            group.add(base);
            
            // Steamer rim
            const rimGeo = new THREE.TorusGeometry(1.6, 0.05, 16, 64);
            const rimMat = new THREE.MeshStandardMaterial({ color: 0xA0522D, roughness: 0.5 });
            const rim = new THREE.Mesh(rimGeo, rimMat);
            rim.position.y = 0.18;
            rim.rotation.x = Math.PI / 2;
            rim.receiveShadow = true;
            group.add(rim);
            
            // Lid (slightly raised for animation)
            const lidGeo = new THREE.CylinderGeometry(1.55, 1.55, 0.08, 32);
            const lidMat = new THREE.MeshStandardMaterial({ color: 0xCD853F, roughness: 0.6 });
            const lid = new THREE.Mesh(lidGeo, lidMat);
            lid.position.y = 0.35;
            lid.castShadow = true;
            lid.receiveShadow = true;
            group.add(lid);
            
            const lidKnobGeo = new THREE.SphereGeometry(0.12, 16);
            const lidKnobMat = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
            const knob = new THREE.Mesh(lidKnobGeo, lidKnobMat);
            knob.position.y = 0.48;
            knob.castShadow = true;
            group.add(knob);
            
            // Momos (dumplings) inside - half visible
            const momoMat = new THREE.MeshStandardMaterial({ color: 0xF5DEB3, roughness: 0.4, emissive: new THREE.Color(0x332211), emissiveIntensity: 0.1 });
            for (let i = 0; i < 5; i++) {
                const momoGeo = new THREE.SphereGeometry(0.25, 16);
                const momo = new THREE.Mesh(momoGeo, momoMat);
                const angle = (i / 5) * Math.PI * 2;
                momo.position.set(Math.cos(angle)*0.9, 0.28, Math.sin(angle)*0.9);
                momo.scale.set(1.0, 0.7, 0.9);
                momo.castShadow = true;
                momo.receiveShadow = true;
                group.add(momo);
                
                // little fold detail
                const foldGeo = new THREE.TorusGeometry(0.12, 0.03, 8, 20);
                const foldMat = new THREE.MeshStandardMaterial({ color: 0xEEDDCC });
                const fold = new THREE.Mesh(foldGeo, foldMat);
                fold.position.set(Math.cos(angle)*1.05, 0.35, Math.sin(angle)*1.05);
                fold.rotation.x = Math.PI/2;
                fold.rotation.z = angle;
                fold.scale.set(0.8, 0.8, 0.8);
                group.add(fold);
            }
            
            // Steam particles (will be animated separately)
            return group;
        }

        // Helper to generate simple wood grain canvas
        function generateWoodGrainCanvas() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#8B5A2B';
            ctx.fillRect(0, 0, 64, 64);
            ctx.strokeStyle = '#5D3A1A';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                ctx.beginPath();
                ctx.moveTo(i*8, 0);
                ctx.lineTo(i*8+10, 64);
                ctx.stroke();
            }
            return canvas;
        }

        // Create Cold Coffee Glass
        function createCoffeeGroup() {
            const group = new THREE.Group();
            
            // Glass body
            const glassGeo = new THREE.CylinderGeometry(0.8, 0.7, 1.8, 32);
            const glassMat = new THREE.MeshStandardMaterial({ 
                color: 0xDDEEFF, 
                transparent: true, 
                opacity: 0.35, 
                roughness: 0.08,
                metalness: 0.1,
                emissive: new THREE.Color(0x112233),
                emissiveIntensity: 0.2
            });
            const glass = new THREE.Mesh(glassGeo, glassMat);
            glass.position.y = 1.0;
            glass.castShadow = true;
            glass.receiveShadow = true;
            group.add(glass);
            
            // Coffee liquid
            const coffeeGeo = new THREE.CylinderGeometry(0.72, 0.65, 1.4, 32);
            const coffeeMat = new THREE.MeshStandardMaterial({ color: 0x3E2723, roughness: 0.3, emissive: new THREE.Color(0x221100), emissiveIntensity: 0.2 });
            const coffee = new THREE.Mesh(coffeeGeo, coffeeMat);
            coffee.position.y = 0.9;
            coffee.castShadow = true;
            coffee.receiveShadow = true;
            group.add(coffee);
            
            // Ice cubes
            const iceMat = new THREE.MeshStandardMaterial({ color: 0xCCEEFF, transparent: true, opacity: 0.7, roughness: 0.1 });
            for (let i = 0; i < 4; i++) {
                const iceGeo = new THREE.BoxGeometry(0.25, 0.25, 0.25);
                const ice = new THREE.Mesh(iceGeo, iceMat);
                ice.position.set(0.3 + i*0.15, 1.1 + i*0.1, 0.2);
                ice.rotation.y = i * 0.5;
                ice.rotation.x = 0.3;
                ice.castShadow = true;
                ice.receiveShadow = true;
                group.add(ice);
            }
            
            // Straw
            const strawGeo = new THREE.CylinderGeometry(0.05, 0.05, 2.2, 8);
            const strawMat = new THREE.MeshStandardMaterial({ color: 0xFF4500 });
            const straw = new THREE.Mesh(strawGeo, strawMat);
            straw.position.set(0.5, 1.6, 0.3);
            straw.rotation.z = 0.2;
            straw.rotation.x = 0.1;
            straw.castShadow = true;
            group.add(straw);
            
            // Condensation drops (small spheres)
            const dropMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF, transparent: true, opacity: 0.6 });
            for (let i = 0; i < 8; i++) {
                const drop = new THREE.Mesh(new THREE.SphereGeometry(0.03, 4), dropMat);
                drop.position.set(0.6, 0.8 + i*0.15, 0.5);
                group.add(drop);
            }
            
            return group;
        }

        // Create floating spice particles and steam
        function createParticles() {
            const particles = new THREE.Group();
            
            // Steam (white puffs)
            const steamMat = new THREE.MeshStandardMaterial({ 
                color: 0xFFFFFF, 
                transparent: true, 
                opacity: 0.4, 
                emissive: new THREE.Color(0xAAAAAA),
                emissiveIntensity: 0.5
            });
            for (let i = 0; i < 12; i++) {
                const puff = new THREE.Mesh(new THREE.SphereGeometry(0.12 + Math.random()*0.1, 5), steamMat);
                puff.position.set((Math.random()-0.5)*3, 0.8 + Math.random()*1.5, (Math.random()-0.5)*3);
                puff.userData = { speed: 0.005 + Math.random()*0.01, offset: Math.random()*10 };
                particles.add(puff);
            }
            
            // Spices (orange/red small cubes)
            const spiceMat = new THREE.MeshStandardMaterial({ color: 0xFF5500, emissive: new THREE.Color(0x441100), emissiveIntensity: 0.3 });
            for (let i = 0; i < 30; i++) {
                const spice = new THREE.Mesh(new THREE.DodecahedronGeometry(0.04), spiceMat);
                spice.position.set((Math.random()-0.5)*5, 0.2 + Math.random()*2, (Math.random()-0.5)*5);
                spice.userData = { speed: 0.002, angle: Math.random()*Math.PI*2 };
                particles.add(spice);
            }
            
            return particles;
        }

        // Build scene
        const momosGroup = createMomosGroup();
        momosGroup.position.set(-1.8, 0.2, 0);
        scene.add(momosGroup);
        
        const coffeeGroup = createCoffeeGroup();
        coffeeGroup.position.set(1.8, 0.1, -0.5);
        scene.add(coffeeGroup);
        
        const particlesGroup = createParticles();
        scene.add(particlesGroup);
        
        // Add some decorative hanging lights or background elements
        const bgSphereGeo = new THREE.SphereGeometry(10, 32, 16);
        const bgSphereMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, side: THREE.BackSide, emissive: new THREE.Color(0x101020), emissiveIntensity: 0.5 });
        const bgSphere = new THREE.Mesh(bgSphereGeo, bgSphereMat);
        scene.add(bgSphere);

        // --- Animations with GSAP ---
        
        // Initial entrance animation
        gsap.from(momosGroup.position, { y: -1, duration: 1.5, ease: "elastic.out(1, 0.4)" });
        gsap.from(coffeeGroup.position, { y: -1, duration: 1.5, ease: "elastic.out(1, 0.4)", delay: 0.2 });
        gsap.from('.hero h1', { opacity: 0, y: 50, duration: 1, delay: 0.5 });
        gsap.from('.hero p', { opacity: 0, y: 30, duration: 0.8, delay: 0.7 });
        gsap.from('.btn', { opacity: 0, scale: 0.5, duration: 0.6, stagger: 0.1, delay: 0.9 });
        
        // Continuous floating animation for groups
        gsap.to(momosGroup.position, { y: 0.35, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to(coffeeGroup.position, { y: 0.25, duration: 2.2, repeat: -1, yoyo: true, ease: "sine.inOut", delay: 0.3 });
        
        // Animate steam particles
        particlesGroup.children.forEach((part, i) => {
            if (part.material && part.material.color.getHex() === 0xFFFFFF) {
                gsap.to(part.position, {
                    y: part.position.y + 1.2,
                    duration: 2 + i*0.2,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut",
                    delay: i * 0.1
                });
                gsap.to(part.scale, {
                    x: 1.5, y: 1.5, z: 1.5,
                    duration: 2,
                    repeat: -1,
                    yoyo: true,
                    ease: "sine.inOut"
                });
            }
        });
        
        // Rotate spices slowly
        particlesGroup.children.forEach(spice => {
            if (spice.geometry.type === 'DodecahedronGeometry') {
                gsap.to(spice.rotation, {
                    y: Math.PI * 2,
                    duration: 8,
                    repeat: -1,
                    ease: "none"
                });
            }
        });

        // Scroll-based interaction (simulate with GSAP ScrollTrigger using mouse wheel)
        // Since we don't have actual scroll, we'll use a dummy scroll trigger to change autoRotate speed and light intensity
        ScrollTrigger.create({
            trigger: "body",
            start: "top top",
            end: "bottom bottom",
            scrub: 0.5,
            onUpdate: (self) => {
                const progress = self.progress;
                controls.autoRotateSpeed = 0.8 + progress * 1.5;
                warmLight.intensity = 1.5 - progress * 0.5;
                coolLight.intensity = 1.2 + progress * 0.8;
            }
        });

        // Button interactions (simple alerts for demo)
        document.getElementById('order-now').addEventListener('click', () => {
            gsap.to(momosGroup.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.2, yoyo: true, repeat: 1 });
            gsap.to(coffeeGroup.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.2, yoyo: true, repeat: 1, delay: 0.1 });
            setTimeout(() => alert('🥟☕ Order placed! (Demo)'), 300);
        });
        document.getElementById('explore-menu').addEventListener('click', () => {
            alert('Explore our full menu: Steamed, Fried, Tandoori Momos & Cold Coffees!');
        });
        document.getElementById('cart-btn').addEventListener('click', () => {
            alert('🛒 Your cart is empty. Add some delicious momos!');
        });

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update(); // for autoRotate
            
            renderer.render(scene, camera);
        }
        animate();

        // --- Handle Window Resize ---
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Small fix for scroll trigger to work with wheel
        window.addEventListener('wheel', () => {
            ScrollTrigger.refresh();
        });

        console.log('🍜 Momos Hub 3D Cart Loaded!');
    </script>
</body>
</html>
